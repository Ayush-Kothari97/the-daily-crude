<!DOCTYPE html>
<!--
  The Daily Crude — index.html
  VERSION: v2 (Live Preview + Price Always Displayed)
  CHANGES FROM v1:
    1. Price fallback upgraded: "–" placeholder replaced by last-known price
       displayed with an amber "est." badge. Prices are NEVER blank.
    2. Full realistic sample DAILY_DATA injected so every section renders.
    3. generate_content.py counterpart (v2) strengthens prompt to always
       provide a numeric estimate rather than leaving any price field empty.
  CARRIES FORWARD from v1:
    - Contact button removed (header + footer)
    - JS rAF ticker at 120px/s, seamless loop, 0.5s hover-debounce
    - safeVal / isMissing guards throughout
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Crude: The world runs on energy and coffee.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* ── SEPIA PAPER PALETTE ── */
  --ink: #0d0d0d;
  --ink-2: #2a2018;
  --ink-3: #3d3530;
  --paper: #f5f0e8;
  --paper-dark: #ede8db;
  --cream: #faf7f2;
  --accent: #c8401a;
  --accent-soft: #e8d5ce;
  --gold: #b8860b;
  --gold-light: #f0e4b0;
  --steel: #1e3a5f;
  --steel-light: #d0dcea;
  --teal: #4ecdc4;
  --teal-soft: #d5f0ee;
  --green: #1a5c38;
  --green-light: #c8e6d5;
  --purple: #4a2060;
  --purple-light: #e0d0ec;
  --border: #c8bfaa;
  --muted: #6b6055;
  --tag-bg: #e8e0d0;
  --masthead-bg: #0d0d0d;
  --card-shadow: 0 1px 4px rgba(60,40,10,0.07), 0 3px 14px rgba(60,40,10,0.06);
  --card-shadow-hover: 0 3px 8px rgba(60,40,10,0.09), 0 10px 32px rgba(60,40,10,0.12);
  --radius: 4px;
  --radius-sm: 3px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-width:100%;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;}

/* ── MASTHEAD ── */
.masthead{background:var(--masthead-bg);border-bottom:6.67px solid var(--accent);width:100%;display:block;position:relative;z-index:1000;overflow:hidden;}

.masthead-top{border-bottom:0.8px solid #333;padding:18px 40px 0 40px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;min-height:139px;width:100%;box-sizing:border-box;}
.logo-block{padding-top:22px;padding-bottom:16px;flex:1;min-width:0;}
.logo-text{font-family:'Playfair Display',serif;font-weight:700;font-size:60px;line-height:51px;color:#f5f0e8;letter-spacing:-1px;display:block;text-decoration:underline;text-decoration-color:#f5f0e8;}
.logo-text .crude{color:var(--accent);text-decoration:underline;text-decoration-color:var(--accent);}
.tagline{font-family:'DM Mono',monospace;font-weight:500;font-size:13px;color:#888;letter-spacing:3px;margin-top:22px;white-space:nowrap;display:block;}
.edition-block{display:flex;flex-direction:column;align-items:flex-end;gap:4px;padding-bottom:16px;padding-top:22px;flex-shrink:0;border-right:2px solid #c8401a;padding-right:14px;}
.edition-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#6a8aaa;}
.edition-date{font-family:'Playfair Display',serif;font-size:18px;color:#f5f0e8;letter-spacing:-0.3px;font-weight:700;line-height:1.1;}
.edition-updated{font-family:'DM Mono',monospace;font-size:10px;color:#999;letter-spacing:0.5px;}

/* ── NAV ── */
.section-nav{display:grid;grid-template-columns:repeat(5,1fr);align-items:stretch;padding:0 40px;height:44.8px;overflow:hidden;position:relative;z-index:1;}
.nav-tab{display:flex;align-items:center;justify-content:center;gap:8px;padding:0 12px;height:44.8px;border-bottom:2.4px solid transparent;cursor:pointer;position:relative;transition:background 0.2s;}
.nav-tab.active{border-bottom-color:#f5f0e8;background:rgba(245,240,232,0.18);border-radius:4px 4px 0 0;}
.nav-tab:hover:not(.active){background:rgba(255,255,255,0.04);}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.nav-label{font-family:'DM Sans',sans-serif;font-weight:600;font-size:13.5px;letter-spacing:1.2px;color:#777;white-space:nowrap;transition:color 0.2s;}
.nav-tab.active .nav-label{color:#f5f0e8;font-weight:700;}
.nav-tab:hover:not(.active) .nav-label{color:#bbb;}

/* ── TICKER ── */
.ticker-bar{background:#1e3a5f;border-bottom:1.6px solid var(--gold);height:36.8px;overflow:hidden;cursor:default;}
.ticker-track{display:inline-flex;align-items:center;height:100%;white-space:nowrap;will-change:transform;backface-visibility:hidden;-webkit-backface-visibility:hidden;}
.t-item{display:inline-flex;align-items:center;font-family:'DM Mono',monospace;font-size:12px;padding:0 2px;}
.t-lbl{color:#aac0dc;font-weight:500;margin-right:7px;letter-spacing:0.5px;}
.t-px{color:#e8e0d0;font-weight:500;margin-right:6px;}
.t-up{color:#4dcc88;font-weight:500;margin-right:6px;}
.t-dn{color:#ff6b6b;font-weight:500;margin-right:6px;}
.t-fl{color:#f0c040;font-weight:500;margin-right:6px;}
.t-chg-up{color:#4dcc88;}
.t-chg-dn{color:#ff6b6b;}
.t-chg-fl{color:#f0c040;}
.t-sep{color:#7a9abf;margin:0 14px;font-size:14px;font-weight:700;}
/* v2: estimated price badge in ticker */
.t-est{font-size:9px;color:#f0c040;letter-spacing:1px;margin-left:2px;font-weight:700;vertical-align:middle;}

/* ── LAYOUT ── */
.page-wrapper{max-width:1480px;margin:0 auto;padding:36px 48px;}

/* ════════════════════════════════════════════════════════════
   TYPOGRAPHY HIERARCHY — The Daily Crude
   ════════════════════════════════════════════════════════════
   LEVEL 1 — Section Title:    28px  Playfair Display 700  --ink   (#0d0d0d)
   LEVEL 2 — Section Tagline:  14px  DM Sans 400 italic    --muted (#6b6055)
   LEVEL 3 — Sub-section Head: 11px  DM Mono 700 CAPS      --muted (#6b6055)
   LEVEL 4 — Card / Art Title: 15px  Playfair Display 700  --ink
   LEVEL 5 — Body Copy:        13px  DM Sans 400           --ink-3 (#3d3530)
   LEVEL 6 — Caption / Meta:   10px  DM Mono 400           --muted (#6b6055)
   LEVEL 7 — Micro Label:       9px  DM Mono 700 CAPS 2px tracking  --muted
   ─────────────────────────────────────────────────────────────
   COLOR ROLES (sepia paper scale):
     --ink     #0d0d0d  Headlines, card titles, strong emphasis
     --ink-2   #2a2018  Sub-headlines, pull-quotes
     --ink-3   #3d3530  Body paragraphs, article copy
     --muted   #6b6055  Labels, metadata, captions
     --accent  #c8401a  Sector tags, call-to-action, highlighted values
     --gold    #b8860b  Bullish figures, estimated values, special notes
     --steel   #1e3a5f  Links, downstream sector, data references
   ════════════════════════════════════════════════════════════ */

/* Level 1 — Section Title */
.section-label{display:inline-flex;align-items:center;gap:10px;margin-bottom:20px;}
.section-label-text{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:500;color:var(--muted);}
.section-label-line{height:1px;width:60px;background:var(--border);}

.section-title{
  font-family:'Playfair Display',serif;
  font-size:28px;
  font-weight:700;
  color:var(--ink);
  margin-bottom:6px;
  line-height:1.2;
  /* newspaper section-flag highlight */
  display:block;
  padding:4px 0 4px 12px;
  border-left:3px solid #b8860b;
  background:linear-gradient(to right,rgba(184,134,11,0.18) 0%,rgba(184,134,11,0.08) 40%,transparent 85%);
}
/* 2D flat emoji icon in section titles */
.sec-ico{
  font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif;
  font-variant-emoji:emoji;
  font-size:0.85em;
  vertical-align:middle;
  margin-right:8px;
  display:inline-block;
}

/* Level 2 — Section Tagline */
.section-subtitle{
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-style:italic;
  color:var(--muted);
  margin-bottom:28px;
  font-weight:400;
  line-height:1.6;
  padding-left:16px;
}

.section-divider{border:none;border-top:2px solid var(--ink);margin:0 0 36px;}
.content-section{margin-bottom:64px;}

/* ── MARKET PULSE ── */
/* v12: Trend cards replace price cards */
/* ══════════════════════════════════════════════════════
   v14: TREND CARDS — dark-panel palette
   Palette derived from Coolors split-complementary theory:
   Crude  : #1c2333 (deep navy slate) + #e8c96a (warm gold) — petroleum = black gold
   Gas    : #0d1f1a (deep forest)     + #4ecdc4 (aqua teal)  — natural gas = clean energy
   Both cards invert against the beige page — strong visual distinction.
   Up sparkline  → #4ecdc4 (teal)   — rising price, cool signal
   Down sparkline → #e8c96a (gold)  — falling price, cautionary warmth
   Coolors reference palette: #1c2333 / #4ecdc4 / #e8c96a / #f7fff7 / #ff6b6b
   ══════════════════════════════════════════════════════ */
.trend-cards-row{display:grid;grid-template-columns:1fr;gap:24px;margin-bottom:40px;}

.trend-card{border-radius:var(--radius);padding:28px 30px 0;position:relative;overflow:hidden;border:none;}
.trend-card::before{display:none;}

/* Crude card — deep navy with gold identity */
.trend-card.crude{
  background:#1c2333;
  border:1px solid rgba(232,201,106,0.30);
  box-shadow:0 4px 28px rgba(0,0,0,0.28), 0 0 0 1px rgba(0,0,0,0.18);
}
/* Gas card — deep forest with teal identity */
.trend-card.gas{
  background:#0d1f1a;
  border:1px solid rgba(78,205,196,0.25);
  box-shadow:0 4px 28px rgba(0,0,0,0.28), 0 0 0 1px rgba(0,0,0,0.18);
}

/* Thin top accent strip */
.trend-card.crude::after{content:'';position:absolute;top:0;left:0;width:100%;height:6px;background:linear-gradient(90deg,#e8c96a,#f0a030);}
.trend-card.gas::after  {content:'';position:absolute;top:0;left:0;width:100%;height:6px;background:linear-gradient(90deg,#4ecdc4,#26b5ac);}

/* Card header */
.tc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
.tc-title-block{display:flex;flex-direction:column;gap:2px;}
.tc-type-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;font-weight:700;}
.trend-card.crude .tc-type-label{color:#e8c96a;}
.trend-card.gas   .tc-type-label{color:#4ecdc4;}

/* Dropdown — dark surface with matching border */
.tc-select-wrap{position:relative;display:inline-flex;align-items:center;}
.trend-card.crude .tc-select-wrap .tc-select{background:#2a3349;border:1px solid #3d4f6a;color:#e8e0d0;}
.trend-card.gas   .tc-select-wrap .tc-select{background:#132a22;border:1px solid #1e4a38;color:#e8e0d0;}
.tc-select{appearance:none;-webkit-appearance:none;border-radius:4px;padding:6px 28px 6px 10px;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;outline:none;min-width:165px;}
.tc-select:focus{outline:none;}
.tc-select-arrow{position:absolute;right:8px;pointer-events:none;font-size:9px;color:#7a8aaa;}

/* Toggles */
.tc-toggles{display:flex;gap:3px;}
.tc-toggle{padding:4px 8px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;border-radius:3px;cursor:pointer;transition:all 0.15s;letter-spacing:0.5px;}
.trend-card.crude .tc-toggle{border:1px solid #3d4f6a;background:transparent;color:#7a8aaa;}
.trend-card.gas   .tc-toggle{border:1px solid #1e4a38;background:transparent;color:#5a8a7a;}
.trend-card.crude .tc-toggle.active{background:#e8c96a;border-color:#e8c96a;color:#1c2333;font-weight:700;}
.trend-card.gas   .tc-toggle.active{background:#4ecdc4;border-color:#4ecdc4;color:#0d1f1a;font-weight:700;}

/* Price row */
.tc-price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;}
.tc-price{font-family:'Playfair Display',serif;font-size:38px;font-weight:700;line-height:1;}
.trend-card.crude .tc-price{color:#ffffff;}
.trend-card.gas   .tc-price{color:#ffffff;}
.tc-change{font-family:'DM Mono',monospace;font-size:12px;}
/* Up = teal (positive signal), Down = gold (cautionary) — same palette language */
.tc-chg-up{color:#4ecdc4;}
.tc-chg-dn{color:#e8a050;}
.tc-chg-fl{color:#8a9aaa;}

/* Sparkline */
.tc-spark-wrap{margin:12px 0 0;position:relative;overflow:hidden;}
/* v32: full-width fill, fixed height, no letterboxing */
svg.tc-spark{width:100%;height:300px;display:block;cursor:crosshair;border-radius:0 0 8px 8px;}

/* Hover tooltip */
/* v38: tooltip — same font size both rows, equal width, above dot */
.tc-tooltip{position:absolute;pointer-events:none;display:none;flex-direction:column;align-items:center;gap:0;}
.tc-tooltip-val{background:rgba(14,22,38,0.92);color:#fff;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;padding:5px 10px 2px;border-radius:4px 4px 0 0;white-space:nowrap;text-align:center;border:1px solid rgba(255,255,255,0.20);border-bottom:1px solid rgba(255,255,255,0.08);width:100%;box-sizing:border-box;}
.tc-tooltip-date{background:rgba(14,22,38,0.92);color:rgba(190,210,235,0.85);font-family:'DM Mono',monospace;font-size:11px;font-weight:400;padding:2px 10px 5px;border-radius:0 0 4px 4px;white-space:nowrap;text-align:center;border:1px solid rgba(255,255,255,0.20);border-top:none;width:100%;box-sizing:border-box;}
.tc-tooltip-line{width:1.5px;height:12px;background:rgba(255,255,255,0.22);}

/* Range & meta text */
.tc-range-text{font-size:13.5px;font-family:'DM Mono',monospace;margin-bottom:4px;font-weight:500;letter-spacing:0.3px;}
.trend-card.crude .tc-range-text{color:#8a9ec0;}
.trend-card.gas   .tc-range-text{color:#6aaa96;}

/* Definition block */
.tc-def{font-size:12.5px;line-height:1.72;padding:14px 26px 22px;border-top:1px solid rgba(255,255,255,0.10);margin:0 -0px;}
.trend-card.crude .tc-def{color:#c8d0dc;}
.trend-card.gas   .tc-def{color:#b8ccc8;}
.tc-def-name{font-weight:700;font-size:13px;}
.trend-card.crude .tc-def-name{color:#f0d878;}
.trend-card.gas   .tc-def-name{color:#6ededa;}

/* ── v19: DAILY INTEL STRIP (between trend cards and drivers) ── */
.intel-strip{margin-bottom:0;}
.intel-strip-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.intel-strip-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;font-weight:700;color:var(--muted);}
.intel-strip-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.5px;}
.intel-strip-mode{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:2px;font-family:'DM Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;}
.intel-mode-inventory{background:rgba(26,92,56,0.12);border:1px solid rgba(26,92,56,0.3);color:#1a5c38;}
.intel-mode-daily{background:rgba(30,58,95,0.12);border:1px solid rgba(30,58,95,0.3);color:#1e3a5f;}
.intel-mode-weekend{background:rgba(74,32,96,0.12);border:1px solid rgba(74,32,96,0.3);color:#4a2060;}

/* Inventory grid — Wednesday */
.inventory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:0;}
.inventory-card{background:var(--cream);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;border-top:3px solid var(--steel);}
.inv-region{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--muted);margin-bottom:4px;}
.inv-metric{font-size:11px;color:var(--muted);margin-bottom:6px;}
.inv-value{font-family:'DM Mono',monospace;font-size:15px;font-weight:700;color:var(--ink);}
.inv-change{font-family:'DM Mono',monospace;font-size:11px;margin-top:2px;}
.inv-chg-up{color:#1a5c38;}
.inv-chg-dn{color:#c8401a;}
.inv-chg-fl{color:var(--gold);}
.inv-pub-date{font-size:9px;color:var(--muted);margin-top:6px;font-family:'DM Mono',monospace;}

/* Daily markets row — Mon/Tue/Thu/Fri */
.daily-markets-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.dm-card{background:var(--cream);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden;}
.dm-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;}
.dm-card.spread::before{background:#c8401a;}
.dm-card.storage::before{background:#1a5c38;}
.dm-card.freight::before{background:#1e3a5f;}
.dm-card.arb::before{background:#4a2060;}
.dm-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--muted);margin-bottom:4px;}
.dm-value{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--ink);line-height:1.1;}
.dm-change{font-family:'DM Mono',monospace;font-size:11px;margin-top:3px;}
.dm-chg-up{color:#c8401a;}
.dm-chg-dn{color:#1a5c38;}
.dm-meta{font-size:10px;color:var(--muted);margin-top:5px;}

/* Weekend intelligence cards */
.weekend-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.weekend-card{background:var(--cream);border:1px solid var(--border);border-left:3px solid var(--purple);border-radius:var(--radius);padding:16px 18px;}
.weekend-card-type{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:#4a2060;margin-bottom:6px;}
.weekend-card-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;line-height:1.35;margin-bottom:8px;}
.weekend-card-body{font-size:12px;color:var(--ink-3);line-height:1.6;margin-bottom:10px;}
.weekend-card-impact{font-size:11.5px;line-height:1.6;padding:8px 12px;background:rgba(74,32,96,0.06);border-left:2px solid #4a2060;border-radius:0 3px 3px 0;}
.weekend-card-impact strong{color:var(--ink);}

/* v19: ARTICLE CARDS section */
.article-section{margin-top:32px;}
.article-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.article-section-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;font-weight:700;color:var(--muted);}
.article-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px;}
.article-card{background:var(--cream);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;display:flex;flex-direction:column;gap:12px;box-shadow:var(--card-shadow);transition:box-shadow 0.2s,transform 0.2s;}
.article-card:hover{box-shadow:var(--card-shadow-hover);transform:translateY(-2px);}
.article-card-sector{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:6px;}
.article-card-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.article-card-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;line-height:1.35;color:var(--ink);}
.article-card-synopsis{font-size:13px;color:var(--ink-3);line-height:1.65;}
.article-card-impact{font-size:12px;line-height:1.65;padding:8px 10px;border-radius:var(--radius-sm);background:var(--paper-dark);border-left:2px solid var(--border);}
.article-card-impact-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;color:var(--muted);margin-bottom:4px;}
.article-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;}
.article-card-source{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.article-card-link a{font-family:'DM Mono',monospace;font-size:10px;color:#1e3a5f;text-decoration:none;}
.article-card-link a:hover{text-decoration:underline;}


/* ── v13: MARKET DRIVERS — richer treatment ── */
.drivers-separator{border:none;border-top:1px solid var(--border);margin:28px 0 28px;}
.market-drivers{background:#0f1e2e;border:1px solid #1e3a5f;border-radius:var(--radius);padding:0;overflow:hidden;}
.drivers-header{padding:20px 28px 16px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.drivers-title{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:#6a9abf;font-weight:700;margin:0;}
/* v13: sentiment badge */
.sentiment-badge{display:inline-flex;align-items:center;gap:8px;padding:5px 14px;border-radius:3px;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1px;}
.sentiment-bull{background:rgba(26,122,64,0.2);border:1px solid rgba(26,122,64,0.4);color:#4dcc88;}
.sentiment-bear{background:rgba(184,96,10,0.2);border:1px solid rgba(184,96,10,0.4);color:#f0a050;}

/* v13: EIA stat callout strip */
.eia-stat-strip{display:flex;gap:24px;padding:12px 28px;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.05);flex-wrap:wrap;}

/* ── STRATEGY ── */
.strategy-featured{display:grid;grid-template-columns:1fr 1.5fr;gap:0;border:2px solid var(--ink);border-radius:var(--radius);overflow:hidden;margin-bottom:28px;}

.strategy-meta-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.strategy-tag{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;background:rgba(255,255,255,0.1);color:#ccc;padding:3px 10px;border-radius:2px;font-weight:600;}
.strategy-read-time{font-size:12px;color:#888;margin-top:auto;}
.strategy-body{background:var(--cream);padding:32px 36px;}
.strategy-intro{font-size:15px;font-weight:500;line-height:1.65;color:var(--ink-2);margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);font-style:italic;}
.strategy-section-head{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:10px;margin-top:20px;border-bottom:1px solid var(--border);padding-bottom:4px;}
.framework-steps{list-style:none;counter-reset:steps;}

.framework-steps li::before{content:counter(steps,decimal-leading-zero);font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--accent);flex-shrink:0;margin-top:3px;}
.strategy-cta{display:inline-flex;align-items:center;gap:8px;margin-top:24px;background:var(--ink);color:var(--paper);padding:10px 20px;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;cursor:pointer;border:none;border-radius:2px;transition:background 0.2s;}
.strategy-cta:hover{background:var(--accent);}
.strategy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.strategy-mini{background:var(--cream);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;}
.strategy-mini:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(60,40,10,0.10);}
.strategy-mini-label{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px;}
.strategy-mini-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;line-height:1.3;margin-bottom:8px;}

.mini-read-time{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}

.project-card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

.project-card-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:12px 0;margin-bottom:12px;}
.project-card-stat{display:flex;flex-direction:column;gap:3px;}
.project-card-stat-label{font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);font-weight:600;}
.project-card-stat-val{font-family:'DM Mono',monospace;font-size:12px;}
.project-card-event{font-size:11.5px;font-weight:700;}
.stage-badge{display:inline-block;padding:3px 9px;border-radius:2px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}

.news-card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.news-card{background:var(--cream);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;position:relative;overflow:hidden;}

.india-headline{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;line-height:1.35;margin-bottom:14px;}
.india-body{font-size:13.5px;color:var(--ink-3);line-height:1.7;}.india-body br{display:block;margin-top:10px;}
.india-stats{display:flex;flex-direction:column;gap:12px;}

.india-stat-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:4px;}
.india-stat-value{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--ink);}
.india-stat-note{font-size:11.5px;color:var(--muted);margin-top:3px;}

/* ── FOOTER ── */
footer{background:var(--masthead-bg);border-top:6.67px solid var(--accent);color:rgba(255,255,255,0.4);padding:22px 40px 0 40px;font-size:12px;line-height:1.8;width:100%;display:block;box-sizing:border-box;margin:0;}
footer .footer-logo{font-family:'Playfair Display',serif;font-size:42px;font-weight:700;color:#f5f0e8;letter-spacing:-1px;line-height:1;text-decoration:underline;text-decoration-color:#f5f0e8;}
footer .footer-logo span{color:var(--accent);text-decoration:underline;text-decoration-color:var(--accent);}
footer .footer-tagline{font-family:'DM Mono',monospace;font-size:11px;color:#999;letter-spacing:2.5px;text-transform:uppercase;margin-top:10px;}
footer .footer-bottom{border-top:0.8px solid #333;margin-top:16px;padding:12px 0;display:flex;align-items:center;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10.5px;color:#999;letter-spacing:0.8px;}

/* ── MISC ── */
.section-block{display:none;}
.section-block.active{display:block;}
.callout{display:flex;align-items:flex-start;gap:14px;background:var(--gold-light);border:1px solid var(--gold);border-radius:4px;padding:16px 20px;margin-bottom:24px;font-size:13px;line-height:1.55;}

}

}
