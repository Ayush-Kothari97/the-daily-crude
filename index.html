<!DOCTYPE html>
<!--
  The Daily Crude — index.html
  VERSION: v2 (Live Preview + Price Always Displayed)
  CHANGES FROM v1:
    1. Price fallback upgraded: "–" placeholder replaced by last-known price
       displayed with an amber "est." badge. Prices are NEVER blank.
    2. Full realistic sample DAILY_DATA injected so every section renders.
    3. generate_content.py counterpart (v2) strengthens prompt to always
       provide a numeric estimate rather than leaving any price field empty.
  CARRIES FORWARD from v1:
    - Contact button removed (header + footer)
    - JS rAF ticker at 120px/s, seamless loop, 0.5s hover-debounce
    - safeVal / isMissing guards throughout
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Crude: The world runs on energy and coffee.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* ── SEPIA PAPER PALETTE ── */
  --ink: #0d0d0d;
  --ink-2: #2a2018;
  --ink-3: #3d3530;
  --paper: #f5f0e8;
  --paper-dark: #ede8db;
  --cream: #faf7f2;
  --accent: #c8401a;
  --accent-soft: #e8d5ce;
  --gold: #b8860b;
  --gold-light: #f0e4b0;
  --steel: #1e3a5f;
  --steel-light: #d0dcea;
  --teal: #4ecdc4;
  --teal-soft: #d5f0ee;
  --green: #1a5c38;
  --green-light: #c8e6d5;
  --purple: #4a2060;
  --purple-light: #e0d0ec;
  --border: #c8bfaa;
  --muted: #6b6055;
  --tag-bg: #e8e0d0;
  --masthead-bg: #0d0d0d;
  --card-shadow: 0 1px 4px rgba(60,40,10,0.07), 0 3px 14px rgba(60,40,10,0.06);
  --card-shadow-hover: 0 3px 8px rgba(60,40,10,0.09), 0 10px 32px rgba(60,40,10,0.12);
  --radius: 4px;
  --radius-sm: 3px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-width:100%;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;}

/* ── MASTHEAD ── */
.masthead{background:var(--masthead-bg);border-bottom:6.67px solid var(--accent);width:100%;display:block;position:relative;z-index:1000;overflow:hidden;}

.masthead-top{border-bottom:0.8px solid #333;padding:18px 40px 0 40px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;min-height:139px;width:100%;box-sizing:border-box;}
.logo-block{padding-top:22px;padding-bottom:16px;flex:1;min-width:0;}
.logo-text{font-family:'Playfair Display',serif;font-weight:700;font-size:60px;line-height:51px;color:#f5f0e8;letter-spacing:-1px;display:block;text-decoration:underline;text-decoration-color:#f5f0e8;}
.logo-text .crude{color:var(--accent);text-decoration:underline;text-decoration-color:var(--accent);}
.tagline{font-family:'DM Mono',monospace;font-weight:500;font-size:13px;color:#888;letter-spacing:3px;margin-top:22px;white-space:nowrap;display:block;}
.edition-block{display:flex;flex-direction:column;align-items:flex-end;gap:4px;padding-bottom:16px;padding-top:22px;flex-shrink:0;border-right:2px solid #c8401a;padding-right:14px;}
.edition-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#6a8aaa;}
.edition-date{font-family:'Playfair Display',serif;font-size:18px;color:#f5f0e8;letter-spacing:-0.3px;font-weight:700;line-height:1.1;}
.edition-updated{font-family:'DM Mono',monospace;font-size:10px;color:#999;letter-spacing:0.5px;}

/* ── NAV ── */
.section-nav{display:grid;grid-template-columns:repeat(5,1fr);align-items:stretch;padding:0 40px;height:44.8px;overflow:hidden;position:relative;z-index:1;}
.nav-tab{display:flex;align-items:center;justify-content:center;gap:8px;padding:0 12px;height:44.8px;border-bottom:2.4px solid transparent;cursor:pointer;position:relative;transition:background 0.2s;}
.nav-tab.active{border-bottom-color:#f5f0e8;background:rgba(245,240,232,0.18);border-radius:4px 4px 0 0;}
.nav-tab:hover:not(.active){background:rgba(255,255,255,0.04);}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.nav-label{font-family:'DM Sans',sans-serif;font-weight:600;font-size:13.5px;letter-spacing:1.2px;color:#777;white-space:nowrap;transition:color 0.2s;}
.nav-tab.active .nav-label{color:#f5f0e8;font-weight:700;}
.nav-tab:hover:not(.active) .nav-label{color:#bbb;}

/* ── TICKER ── */
.ticker-bar{background:#1e3a5f;border-bottom:1.6px solid var(--gold);height:36.8px;overflow:hidden;cursor:default;}
.ticker-track{display:inline-flex;align-items:center;height:100%;white-space:nowrap;will-change:transform;backface-visibility:hidden;-webkit-backface-visibility:hidden;}
.t-item{display:inline-flex;align-items:center;font-family:'DM Mono',monospace;font-size:12px;padding:0 2px;}
.t-lbl{color:#aac0dc;font-weight:500;margin-right:7px;letter-spacing:0.5px;}
.t-px{color:#e8e0d0;font-weight:500;margin-right:6px;}
.t-up{color:#4dcc88;font-weight:500;margin-right:6px;}
.t-dn{color:#ff6b6b;font-weight:500;margin-right:6px;}
.t-fl{color:#f0c040;font-weight:500;margin-right:6px;}
.t-chg-up{color:#4dcc88;}
.t-chg-dn{color:#ff6b6b;}
.t-chg-fl{color:#f0c040;}
.t-sep{color:#7a9abf;margin:0 14px;font-size:14px;font-weight:700;}
/* v2: estimated price badge in ticker */
.t-est{font-size:9px;color:#f0c040;letter-spacing:1px;margin-left:2px;font-weight:700;vertical-align:middle;}

/* ── LAYOUT ── */
.page-wrapper{max-width:1480px;margin:0 auto;padding:36px 48px;}

/* ════════════════════════════════════════════════════════════
   TYPOGRAPHY HIERARCHY — The Daily Crude
   ════════════════════════════════════════════════════════════
   LEVEL 1 — Section Title:    28px  Playfair Display 700  --ink   (#0d0d0d)
   LEVEL 2 — Section Tagline:  14px  DM Sans 400 italic    --muted (#6b6055)
   LEVEL 3 — Sub-section Head: 11px  DM Mono 700 CAPS      --muted (#6b6055)
   LEVEL 4 — Card / Art Title: 15px  Playfair Display 700  --ink
   LEVEL 5 — Body Copy:        13px  DM Sans 400           --ink-3 (#3d3530)
   LEVEL 6 — Caption / Meta:   10px  DM Mono 400           --muted (#6b6055)
   LEVEL 7 — Micro Label:       9px  DM Mono 700 CAPS 2px tracking  --muted
   ─────────────────────────────────────────────────────────────
   COLOR ROLES (sepia paper scale):
     --ink     #0d0d0d  Headlines, card titles, strong emphasis
     --ink-2   #2a2018  Sub-headlines, pull-quotes
     --ink-3   #3d3530  Body paragraphs, article copy
     --muted   #6b6055  Labels, metadata, captions
     --accent  #c8401a  Sector tags, call-to-action, highlighted values
     --gold    #b8860b  Bullish figures, estimated values, special notes
     --steel   #1e3a5f  Links, downstream sector, data references
   ════════════════════════════════════════════════════════════ */

/* Level 1 — Section Title */
.section-label{display:inline-flex;align-items:center;gap:10px;margin-bottom:20px;}
.section-label-text{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:500;color:var(--muted);}
.section-label-line{height:1px;width:60px;background:var(--border);}

.section-title{
  font-family:'Playfair Display',serif;
  font-size:28px;
  font-weight:700;
  color:var(--ink);
  margin-bottom:6px;
  line-height:1.2;
  /* newspaper section-flag highlight */
  display:block;
  padding:4px 0 4px 12px;
  border-left:3px solid #b8860b;
  background:linear-gradient(to right,rgba(184,134,11,0.18) 0%,rgba(184,134,11,0.08) 40%,transparent 85%);
}
/* 2D flat emoji icon in section titles */
.sec-ico{
  font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif;
  font-variant-emoji:emoji;
  font-size:0.85em;
  vertical-align:middle;
  margin-right:8px;
  display:inline-block;
}

/* Level 2 — Section Tagline */
.section-subtitle{
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-style:italic;
  color:var(--muted);
  margin-bottom:28px;
  font-weight:400;
  line-height:1.6;
  padding-left:16px;
}

.section-divider{border:none;border-top:2px solid var(--ink);margin:0 0 36px;}
.content-section{margin-bottom:64px;}
</style>
</head>
<body>
<p>Placeholder — full restore pending via direct API.</p>
</body>
</html>
