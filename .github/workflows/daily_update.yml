name: Daily Crude — Content Update

on:
  schedule:
    # 08:00 IST = 02:30 UTC
    - cron: "30 2 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  update-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the updated HTML back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai>=1.30.0

      - name: Run content generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generate_content.py

      - name: Commit updated HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: daily content update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
