name: Daily Energy Digest

on:
  schedule:
    # 7:00 AM IST = 01:30 UTC
    - cron: '30 1 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai requests

      - name: Generate daily digest
        env:
          # Key is injected from GitHub Secrets at runtime only.
          # It is never written to any file, never printed, never logged.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_digest.py

      - name: Commit updated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/content.json
          git diff --staged --quiet || git commit -m "digest: $(date -u +'%Y-%m-%d') auto-update"
          git push
